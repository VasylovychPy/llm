- name: Install Ollama + Grafana Alloy on LLM instance
  hosts: all
  become: true

  vars_files:
    - vars/private.yml

  tasks:
    - name: Import Grafana GPG key
      ansible.builtin.rpm_key:
        state: present
        key: https://rpm.grafana.com/gpg.key

    - name: Add Grafana repo
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/grafana.repo
        mode: "0644"
        content: |
          [grafana]
          name=grafana
          baseurl=https://rpm.grafana.com
          repo_gpgcheck=1
          enabled=1
          gpgcheck=1
          gpgkey=https://rpm.grafana.com/gpg.key
          sslverify=1
          sslcacert=/etc/pki/tls/certs/ca-bundle.crt

    - name: Install Alloy
      ansible.builtin.dnf:
        name:
          - alloy
        state: present
        update_cache: true

    - name: Install Ollama
      ansible.builtin.shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    - name: Create Ollama systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service.d
        state: directory
        mode: "0755"

    - name: Configure Ollama listen address
      ansible.builtin.copy:
        dest: /etc/systemd/system/ollama.service.d/override.conf
        mode: "0644"
        content: |
          [Service]
          Environment="OLLAMA_HOST={{ ollama_host }}"
      notify: restart ollama

    - name: Create Alloy config
      ansible.builtin.copy:
        dest: /etc/alloy/config.alloy
        mode: "0644"
        content: |
          prometheus.exporter.unix "node" {}

          prometheus.relabel "node" {
            forward_to = [prometheus.remote_write.prom.receiver]

            rule {
              action       = "replace"
              target_label = "instance"
              replacement  = "llm-olama"
            }

            rule {
              action       = "replace"
              target_label = "job"
              replacement  = "integrations/unix"
            }
          }

          prometheus.scrape "node" {
            targets    = prometheus.exporter.unix.node.targets
            forward_to = [prometheus.relabel.node.receiver]
          }

          prometheus.remote_write "prom" {
            endpoint {
              url = "{{ prometheus_remote_write_url }}"
            }
          }
      notify: restart alloy

    - name: Start and enable Ollama
      ansible.builtin.systemd:
        name: ollama
        daemon_reload: true
        state: started
        enabled: true

    - name: Start and enable Alloy
      ansible.builtin.systemd:
        name: alloy
        state: started
        enabled: true

    - name: Pull Ollama model
      ansible.builtin.shell: ollama pull llama3.2:3b    

  handlers:
    - name: restart ollama
      ansible.builtin.systemd:
        name: ollama
        daemon_reload: true
        state: restarted

    - name: restart alloy
      ansible.builtin.systemd:
        name: alloy
        state: restarted